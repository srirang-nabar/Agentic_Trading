# Stage 6 — Experiment 3 (H3): market-maker duopoly, local-8B pair.
# Design pre-registered in HYPOTHESES.md (H3 + Amendment A5).
# The benchmark-validation gate (gate_stage6 pure-sim tests) must be green
# before this config is ever run.
experiment_id: duopoly_h3
design: duopoly
seed: 40426
matched_schedules: true      # shared noise-flow seeds across cells (A2.ii precedent)
parallel_sessions: 8
market:
  reference_value: 100
  arrival_rate: 5.0
  inventory_phi: 2.0
  max_half_spread: 20
  n_rounds: 150
  probe_rounds: [80, 100, 120]
cells:
  - name: duo_llm_a
    agent_type: llm
    n_sessions: 30
    llm: &llm_local
      model: Qwen/Qwen2.5-7B-Instruct
      revision: a09a35458c702b33eeacc393d103063234e8bc28
      served_by: vllm-0.25.0
      template: duopoly_a
      temperature: 0.7
      max_tokens: 80
      k_retries: 3
  - name: duo_llm_b
    agent_type: llm
    n_sessions: 30
    llm:
      <<: *llm_local
      template: duopoly_b
